version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: zentek-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Password123!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      # ODBC Driver 18 encrypts by default; -C trusts the self-signed cert in dev
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Password123! -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./src/ZentekProducts.Api
      dockerfile: Dockerfile
    container_name: zentek-api
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=ZentekProducts;User Id=sa;Password=Password123!;TrustServerCertificate=True;
      - JwtSettings__Secret=YourSuperSecretKeyThatIsAtLeast32CharactersLong!
      - JwtSettings__Issuer=ZentekProductsApi
      - JwtSettings__Audience=ZentekProductsClient
      - JwtSettings__ExpirationMinutes=60
      - Auth__Username=admin
      - Auth__Password=admin123
    ports:
      - "5000:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      sqlserver:
        condition: service_healthy

  client:
    build:
      context: ./src/ZentekProducts.Client
      dockerfile: Dockerfile
      args:
        # Use nginx reverse proxy for API calls
        VITE_API_URL: "/api"
    container_name: zentek-client
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

  # Optional: run the Vite dev server in a container (hot reload).
  # Start with: docker compose --profile dev up --build
  client-dev:
    profiles: ["dev"]
    image: node:20-alpine
    container_name: zentek-client-dev
    working_dir: /app
    environment:
      VITE_API_URL: "http://localhost:5000"
    volumes:
      - ./src/ZentekProducts.Client:/app
    command: sh -lc "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy

volumes:
  sqlserver_data: